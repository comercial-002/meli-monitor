<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ML Monitor — Autorização</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#dddcd5;--text:#1a1a16;
  --muted:#7a7970;--muted2:#a8a79e;--accent:#f5c800;--accent-dark:#d4a900;
  --green:#1a9e5c;--green-light:#e8f7ef;--green-border:#a8dfc2;
  --red:#dc2626;--red-light:#fef2f2;--red-border:#fca5a5;
  --ml-yellow:#ffe600;--radius:10px;--radius-lg:16px;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;max-width:520px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.brand-icon{width:36px;height:36px;background:var(--ml-yellow);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.brand-name{font-weight:700;font-size:17px;letter-spacing:-0.3px}
.status-icon{font-size:40px;margin-bottom:14px;text-align:center}
h1{font-size:20px;font-weight:700;letter-spacing:-0.4px;margin-bottom:6px}
.subtitle{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.code-wrap{background:#1a1a16;border-radius:var(--radius);padding:16px;margin-bottom:16px;position:relative}
.code-label{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.code-text{font-family:var(--mono);font-size:12.5px;color:#a8ff78;word-break:break-all;line-height:1.6}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:var(--radius);border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#1a1a16}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:var(--bg);color:var(--muted);border:1px solid var(--border);margin-top:10px}
.btn-secondary:hover{background:#e8e7e0;color:var(--text)}
.success-msg{display:none;align-items:center;gap:8px;color:var(--green);background:var(--green-light);border:1px solid var(--green-border);border-radius:var(--radius);padding:11px 14px;margin-bottom:14px;font-size:13.5px;font-weight:500}
.error-card{text-align:center}
.error-card .code-wrap{background:var(--red-light);border:1px solid var(--red-border)}
.error-card .code-text{color:var(--red);font-family:var(--font)}
.instructions{background:var(--bg);border-radius:var(--radius);padding:16px;margin-top:20px}
.instructions h3{font-size:12px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.step{display:flex;gap:10px;margin-bottom:8px;font-size:13px;line-height:1.5}
.step:last-child{margin-bottom:0}
.step-num{width:20px;height:20px;background:var(--accent);border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.warning{font-size:12px;color:var(--muted);text-align:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="card" id="main-card">
  <div class="brand">
    <div class="brand-icon">🛒</div>
    <div class="brand-name">ML Monitor</div>
  </div>
  <!-- Content injected by JS -->
  <div id="content"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const code  = params.get('code');
const error = params.get('error');
const state = params.get('state');
const content = document.getElementById('content');

if (error) {
  content.innerHTML = `
    <div class="error-card">
      <div class="status-icon">❌</div>
      <h1>Autorização negada</h1>
      <p class="subtitle">O vendedor negou o acesso ou ocorreu um erro durante a autorização.</p>
      <div class="code-wrap">
        <div class="code-label">Erro recebido</div>
        <div class="code-text">${error}${params.get('error_description') ? ': ' + params.get('error_description') : ''}</div>
      </div>
      <button class="btn btn-secondary" onclick="window.close()">Fechar esta aba</button>
    </div>`;
} else if (code) {
  content.innerHTML = `
    <div class="status-icon">✅</div>
    <h1>Conta autorizada!</h1>
    <p class="subtitle">Copie o código abaixo e cole no ML Monitor para ativar o monitoramento desta conta.</p>

    <div id="success-msg" class="success-msg">
      ✓ Código copiado para a área de transferência!
    </div>

    <div class="code-wrap">
      <div class="code-label">Código de autorização (code)</div>
      <div class="code-text" id="code-display">${code}</div>
    </div>

    <button class="btn btn-primary" onclick="copyCode()">
      📋 Copiar código
    </button>
    <button class="btn btn-secondary" onclick="window.close()">
      Fechar esta aba
    </button>

    <div class="instructions">
      <h3>Próximos passos</h3>
      <div class="step">
        <div class="step-num">1</div>
        <div>Copie o código acima clicando no botão</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div>Volte ao ML Monitor e clique em <strong>"+ Adicionar conta"</strong></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div>Cole o código no campo <strong>"Código de autorização"</strong></div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div>O sistema trocará o código por um token automaticamente</div>
      </div>
    </div>

    <p class="warning">⚠️ Este código expira em <strong>10 minutos</strong>. Não compartilhe com ninguém.</p>`;
} else {
  content.innerHTML = `
    <div class="status-icon">⏳</div>
    <h1>Aguardando autorização</h1>
    <p class="subtitle">Nenhum código foi recebido nesta URL. Certifique-se de que o fluxo OAuth foi iniciado corretamente a partir do ML Monitor.</p>
    <button class="btn btn-secondary" onclick="window.close()">Fechar</button>`;
}

function copyCode() {
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => {
    const msg = document.getElementById('success-msg');
    if (msg) { msg.style.display = 'flex'; setTimeout(() => msg.style.display = 'none', 3000); }
  }).catch(() => {
    // fallback: select text
    const el = document.getElementById('code-display');
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
  });
}
</script>
</body>
</html>
